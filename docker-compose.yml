version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: fintrack_db
    environment:
      POSTGRES_USER: fintrack_user
      POSTGRES_PASSWORD: fintrack_password
      POSTGRES_DB: fintrack_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack_user -d fintrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fintrack_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fintrack_user:fintrack_password@db/fintrack_db
      SECRET_KEY: fintrack_secret_production_key_xyz_123
      FLASK_ENV: production
      UPLOAD_FOLDER: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    expose:
      - "5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fintrack_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"
    environment:
      NODE_ENV: production

volumes:
  postgres_data:
  backend_uploads:
